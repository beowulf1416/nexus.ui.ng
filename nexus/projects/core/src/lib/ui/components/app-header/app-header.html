<div class="component component-common-header">
  <mat-menu #menu_user="matMenu">
    @if (is_user_authenticated()) {
    <a title="Profile" routerLink="/me" mat-menu-item>
      <span class="material-symbols-outlined">co_present</span>
      <span>Profile</span>
    </a>
    <a title="Sign Out" routerLink="/session/sign-out" mat-menu-item>
      <span class="material-symbols-outlined">logout</span>
      <span>Sign Out</span>
    </a>
    }
    @if (!is_user_authenticated()) {
    <a title="Sign In" routerLink="/session/sign-in" mat-menu-item>
      <span class="material-symbols-outlined">login</span>
      <span>Sign In</span>
    </a>
    }
  </mat-menu>

  <mat-menu #menu_tenants="matMenu">
    @for (tenant of tenants(); track tenant.id) {
    <a title="{{ tenant.name }}" routerLink="/session/tenant/{{ tenant.id }}" mat-menu-item>
      <span>{{ tenant.name }}</span>
    </a>
    }
    <mat-divider></mat-divider>
    <a title="Join Tenant" routerLink="/tenant/join" mat-menu-item>
      <span>Join Tenant</span>
    </a>
  </mat-menu>

  <mat-toolbar id="tb-header" color="primary">
    <button type="button" title="Applications" mat-icon-button (click)="on_applications($event)">
      <mat-icon>apps</mat-icon>
    </button>
    <span>Applications</span>
    <span class="spacer"></span>
    <button type="button" title="Notifications" mat-icon-button (click)="on_notifications($event)">
      <mat-icon>inbox</mat-icon>
    </button>
    @if (is_user_authenticated()) {
    <button type="button" title="Tenants" mat-icon-button [matMenuTriggerFor]="menu_tenants">
      <mat-icon>domain</mat-icon>
    </button>
    }
    <button type="button" title="User" mat-icon-button [matMenuTriggerFor]="menu_user">
      <mat-icon>account_circle</mat-icon>
    </button>
  </mat-toolbar>
</div><!-- component -->
