<div class="component component-common-header">
  <mat-menu #menu_user="matMenu">
    @if (is_user_authenticated()) {
    <a title="Profile" routerLink="/me" mat-menu-item>
      <span class="material-symbols-outlined">co_present</span>
      <span>Profile</span>
    </a>
    <a title="Sign Out" routerLink="/session/sign-out" mat-menu-item>
      <span class="material-symbols-outlined">logout</span>
      <span>Sign Out</span>
    </a>
    }
    @if (!is_user_authenticated()) {
    <a title="Sign In" routerLink="/session/sign-in" mat-menu-item>
      <span class="material-symbols-outlined">login</span>
      <span>Sign In</span>
    </a>
    }
  </mat-menu>

  <mat-toolbar id="tb-header" color="primary">
    <button type="button" title="Applications" mat-icon-button>
      <mat-icon>apps</mat-icon>
    </button>
    <span>Applications</span>
    <span class="spacer"></span>
    <button type="button" title="User" mat-icon-button [matMenuTriggerFor]="menu_user">
      <mat-icon>account_circle</mat-icon>
    </button>
  </mat-toolbar>
</div><!-- component -->
