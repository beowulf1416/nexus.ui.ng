<div class="component component-tenant">
  <div class="wrapper form">
    <form id="tenant" class="form-tenant" method="post" action="">
      <h3 mat-dialog-title>
        {{ data && data.tenant_item ? data.tenant_item?.name : 'New Tenant' }}
      </h3>
      <mat-dialog-content>
        <div class="errors">
        </div><!-- .errors -->
        <mat-form-field>
          <mat-label>Name</mat-label>
          <input class="input name" placeholder="Name" matInput [formField]="component.form.name">
        </mat-form-field>
        <mat-form-field>
          <mat-label>Domain</mat-label>
          <input class="input domain" placeholder="Domain" matInput [formField]="component.form.domain">
        </mat-form-field>
        <input type="hidden" [formField]="component.form.id">
      </mat-dialog-content>
      <mat-dialog-actions>
        <button type="button" matFab extended (click)="on_cancel($event)">
          <mat-icon>cancel</mat-icon>
          <span>Cancel</span>
        </button>
        <button type="button" matFab extended (click)="on_submit($event)">
          <mat-icon>save</mat-icon>
          <span>Save</span>
        </button>
      </mat-dialog-actions>
    </form>
  </div><!-- .wrapper -->
</div><!-- .component -->
