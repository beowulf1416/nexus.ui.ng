<div class="component tenant-selection-dialog">
  <div class="wrapper form">
    <form class="form tenant-selection-dialog" method="post" action="">
      <h4 mat-dialog-title>Select Tenant</h4>
      <mat-dialog-content>
        <div class="errors">
        </div><!-- .errors -->
        <div class="actions">
          <mat-toolbar>
            <div class="wrapper filter">
              <mat-form-field>
                <input type="search" class="input filter" placeholder="Search..." matInput/>
                <button type="button" class="btn search" title="Search" mat-icon-button matSuffix>
                  <mat-icon>search</mat-icon>
                </button>
                <button type="button" class="btn clear" title="Clear" mat-icon-button matSuffix>
                  <mat-icon>clear</mat-icon>
                </button>
              </mat-form-field>
            </div><!-- .wrapper -->
          </mat-toolbar>
        </div><!-- .actions -->
      </mat-dialog-content>
        <div class="wrapper selected">
          <table class="table selected">
            <caption>Selected Tenants</caption>
            <thead>
              <tr>
                <th>
                  <input type="checkbox" title="Select all" class="input check select-all" />
                </th>
                <th>Name</th>
              </tr>
            </thead>
            <tfoot>
              <tr>
              </tr>
            </tfoot>
            <tbody>
              @for (tr of component.form.selected; let i = $index; track i) {
                <tr>
                  <td><input type="checkbox" title="Select tenant" class="input check select-tenant" /></td>
                  <td>{{ tr.tenant.name().value() }}</td>
                </tr>
              }
            </tbody>
          </table>
        </div><!-- .wrapper -->
        <div class="wrapper matches">
          <table class="table matches">
            <caption>Matches</caption>
            <thead>
              <tr>
                <th>Tenant</th>
              </tr>
            </thead>
            <tfoot>
              <tr>
              </tr>
            </tfoot>
            <tbody>
              @for (tr of component.form.matches; let i = $index; track i) {
                <tr>
                  <td><input type="checkbox" title="Select tenant" class="input check select-tenant" /></td>
                  <td>{{ tr.tenant.name().value() }}</td>
                </tr>
              }
            </tbody>
          </table>
        </div><!-- .wrapper -->
      <mat-dialog-actions>
        <button type="button" class="btn cancel" mat-icon-button (click)="on_cancel($event)">
          <mat-icon>cancel</mat-icon>
        </button>
        <button type="button" class="btn ok" mat-icon-button (click)="on_ok($event)">
          <mat-icon>check</mat-icon>
        </button>
      </mat-dialog-actions>
    </form>
  </div><!-- .wrapper -->
</div><!-- .component -->
