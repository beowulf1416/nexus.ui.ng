<div class="component roles">
  <div class="wrapper form">
    <form class="form-roles" method="post" action="">
      <div class="wrapper actions">
        <mat-toolbar>
          <tenant-selector [multiple]="false" (tenants_selected)="on_tenants_selected($event)"></tenant-selector>
          <div class="separator">|</div>
          <button type="button" class="btn roles" title="New Role" aria-label="New Role" mat-icon-button (click)="show_role_dialog($event)">
            <mat-icon>domain_add</mat-icon>
          </button>
          <div class="separator">|</div>
          <button type="button" class="btn set-active" title="Enable" aria-label="Enable" [disabled]="!roles_selected()" mat-icon-button (click)="on_set_active($event, true)">
            <mat-icon>toggle_on</mat-icon>
          </button>
          <button type="button" class="btn set-active" title="Disable" aria-label="Disable" [disabled]="!roles_selected()" mat-icon-button (click)="on_set_active($event, false)">
            <mat-icon>toggle_off</mat-icon>
          </button>
          <div class="separator">|</div>
            <button type="button" class="btn assign-permissions" title="Assign Permissions" aria-label="Disable" [disabled]="!roles_selected()" mat-icon-button>
              <mat-icon>add_moderator</mat-icon>
            </button>
            <button type="button" class="btn revoke-permissions" title="Revoke Permissions" aria-label="Disable" [disabled]="!roles_selected()"mat-icon-button>
              <mat-icon>remove_moderator</mat-icon>
            </button>
          <div class="separator">|</div>
          <div class="wrapper filter">
            <mat-form-field appearance="outline">
              <mat-label>Search</mat-label>
              <input class="input filter" placeholder="Filter" matInput [formField]="component.form.filter" />
              <button type="button" class="btn filter" title="Search" aria-label="Search" mat-icon-button matSuffix (click)="on_search($event)">
                <mat-icon>search</mat-icon>
              </button>
              <button type="button" class="btn reset" title="Clear" aria-label="Clear" mat-icon-button matSuffix>
                <mat-icon>close_small</mat-icon>
              </button>
            </mat-form-field>
          </div><!-- .wrapper filter -->
          <button type="button" class="btn refresh" title="Refresh" aria-label="Refresh" mat-icon-button>
            <mat-icon>refresh</mat-icon>
          </button>

        </mat-toolbar>
      </div><!-- .wrapper -->
      <div class="wrapper content">
        <table class="table roles">
          <thead>
            <tr>
              <th>
                <input type="checkbox" title="Select All" (change)="on_select_all($event)" />
              </th>
              <th>Role</th>
              <th>Name</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tfoot>
            <tr>
              <td colspan="3">

              </td>
            </tr>
          </tfoot>
          <tbody>
            @for (r of component.form.roles; let i = $index; track i) {
              <tr>
                <td>
                  <input type="checkbox" title="Select Role" class="input select-role" [formField]="r.selected" />
                </td>
                <td>{{ r.role.name().value() }}</td>
                <td>

                </td>
              </tr>
            }
          </tbody>
        </table>
      </div><!-- .wrapper content -->
    </form>
  </div><!-- .wrapper -->
</div><!-- .component -->
