<lib-header></lib-header>
<div class="feature sign-up">
  <div class="wrapper">
    <form class="sign-up">
      <mat-card appearance="outlined">
        <mat-card-header>
          <mat-card-title>Sign Up</mat-card-title>
          <mat-card-subtitle>Please provide your credentials</mat-card-subtitle>
        </mat-card-header>
        <mat-card-content>
          <mat-form-field appearance="outline">
            <mat-label>Email</mat-label>
            <input type="email" id="email" name="email" placeholder="Email" required matInput />
          </mat-form-field>
        </mat-card-content>
        <mat-card-actions>
          <button type="submit" id="btn_submit" class="btn-submit" mat-fab extended color="primary">
            <mat-icon>check_circle</mat-icon> Sign Up
          </button>
        </mat-card-actions>
        <mat-card-footer> footer </mat-card-footer>
      </mat-card>
    </form>
  </div>
  <!--.wrapper -->
</div>
<!-- .feature -->
