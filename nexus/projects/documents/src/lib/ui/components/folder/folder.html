<div class="component folder">
  <div class="wrapper folder">
    <mat-icon>folder</mat-icon>
    <span>{{ name() }}</span>
    <button type="button" title="Expand" mat-icon-button (click)="toggle_collapsed()">
      @if (is_collapsed()) {
        <span class="material-symbols-outlined">
        expand_circle_right
        </span>
      } @else {
        <span class="material-symbols-outlined">
          expand_circle_up
        </span>
      }
    </button>
  </div><!-- .wrapper -->
  @if (is_loading()){
    <mat-icon>loading</mat-icon>
  }
  @if (!is_collapsed()) {
    <div class="wrapper subfolders">
      <ul>
        @for (subfolder of subfolders(); track subfolder.id) {
          <doc-folder [name]="subfolder.name"></doc-folder>
        }
      </ul>
    </div><!-- .wrapper -->
  }
</div><!-- .folder -->
