<div class="component folder">
  <div class="wrapper folder">
    <button type="button" class="btn folder" (click)="toggle_collapsed()">
      @if (is_collapsed()) {
        <span class="material-symbols-outlined">folder</span>
      } @else {
      <span class="material-symbols-outlined">folder_open</span>
      }
      <span>{{ name() }}</span>
    </button>
  </div><!-- .wrapper -->
  @if (is_loading()){
    <mat-icon>loading</mat-icon>
  }
  @if (!is_collapsed()) {
    <div class="wrapper subfolders">
      <ul>
        @for (subfolder of subfolders(); track subfolder.id) {
          <doc-folder [name]="subfolder.name"></doc-folder>
        }
      </ul>
    </div><!-- .wrapper -->
  }
</div><!-- .folder -->
