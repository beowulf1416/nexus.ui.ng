<div class="component upload-dialog">
  <h2 mat-dialog-title>Upload File</h2>
  <form class="upload-dialog-form" method="post" action="">
    <mat-dialog-content>
      <div class="wrapper field">
        <mat-label>File</mat-label>
        <input type="file" id="file" name="file" class="input file" />
      </div><!-- .wrapper -->
    </mat-dialog-content>
    <mat-dialog-actions>
      <button type="button" matFab extended (click)="on_cancel($event)">
        <mat-icon>cancel</mat-icon>
        <span>Cancel</span>
      </button>
      <button type="button" matFab extended (click)="on_upload($event)">
        <mat-icon>arrow_circle_up</mat-icon>
        <span>Upload</span>
      </button>
    </mat-dialog-actions>
  </form>
</div><!-- .component -->
