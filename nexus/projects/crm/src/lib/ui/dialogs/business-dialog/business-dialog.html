<div class="component business-dialog">
  <div class="wrapper form">
    <form id="business" class="form-business" method="post" action="" (submit)="on_submit($event)">
      <h3 mat-dialog-title>{{ title() }}</h3>
      <mat-dialog-content>
        <div class="errors">
          @if (component.errors().length > 0) {
            @for (error of component.errors(); track error) {
              <div>{{ error }}</div>
            }
          }
        </div><!-- .errors -->
        <fieldset class="names">
          <mat-form-field class="field block">
            <mat-label>Name</mat-label>
            <input class="input name" placeholder="Name" matInput [formField]="component.form.name">
          </mat-form-field>
          <mat-form-field class="field block">
            <mat-label>Description</mat-label>
            <input class="input description" placeholder="Description" matInput [formField]="component.form.description">
          </mat-form-field>
        </fieldset><!-- .names -->
        <fieldset class="address">
          <legend>Address</legend>
          <mat-form-field class="field block">
            <mat-label>Country</mat-label>
            <input class="input country" placeholder="Country" matInput [formField]="component.form.address.country">
          </mat-form-field>
          <mat-form-field class="field block">
            <mat-label>State</mat-label>
            <input class="input state" placeholder="State" matInput [formField]="component.form.address.state">
          </mat-form-field>
          <mat-form-field class="field block">
            <mat-label>Region</mat-label>
            <input class="input region" placeholder="Region" matInput [formField]="component.form.address.region">
          </mat-form-field>
          <mat-form-field class="field block">
            <mat-label>City</mat-label>
            <input class="input city" placeholder="City" matInput [formField]="component.form.address.city">
          </mat-form-field>
          <mat-form-field class="field block">
            <mat-label>ZIP</mat-label>
            <input class="input zip" placeholder="ZIP" matInput [formField]="component.form.address.zip">
          </mat-form-field>
        </fieldset>
      </mat-dialog-content>
      <mat-dialog-actions>
        <button type="button" matFab extended (click)="on_cancel($event)">
          <mat-icon>cancel</mat-icon>
          <span>Cancel</span>
        </button>
        <button type="submit" matFab extended [disabled]="component.form().invalid()">
          <mat-icon>save</mat-icon>
          <span>Save</span>
        </button>
      </mat-dialog-actions>
      <input type="hidden" [formField]="component.form.tenant_id">
      <input type="hidden" [formField]="component.form.business_id">
    </form>
  </div><!-- .wrapper -->
</div><!-- .component -->
