<div class="component partner-dialog">
  <div class="wrapper form">
    <form class="partner-dialog-form" method="post" action="">
      <h3 mat-dialog-title>{{ title() }}</h3>
      <mat-dialog-content>
        <div class="errors">
          @if (component.errors().length > 0) {
            @for (error of component.errors(); track error) {
              <div>{{ error }}</div>
            }
          }
        </div><!-- .errors -->
        <fieldset class="business">
          <legend>Business</legend>
          <mat-form-field class="field block">
            <mat-label>Name</mat-label>
            <input class="input name" placeholder="Name" matInput [formField]="component.form.business.name">
          </mat-form-field>
          <mat-form-field class="field block">
            <mat-label>Description</mat-label>
            <textarea class="input description" placeholder="Description" matInput [formField]="component.form.business.description"></textarea>
          </mat-form-field>
        </fieldset><!-- .business -->
        <fieldset class="names">
          <legend>Names</legend>
          <mat-form-field class="field block">
            <mat-label>Prefix</mat-label>
            <input class="input prefix" placeholder="Prefix" matInput [formField]="component.form.names.prefix">
          </mat-form-field>
          <mat-form-field class="field block">
            <mat-label>First Name</mat-label>
            <input class="input first_name" placeholder="First Name" matInput [formField]="component.form.names.first_name">
          </mat-form-field>
          <mat-form-field class="field block">
            <mat-label>Middle Name</mat-label>
            <input class="input middle_name" placeholder="Middle Name" matInput [formField]="component.form.names.middle_name">
          </mat-form-field>
          <mat-form-field class="field block">
            <mat-label>Last Name</mat-label>
            <input class="input last_name" placeholder="Last Name" matInput [formField]="component.form.names.last_name">
          </mat-form-field>
          <mat-form-field class="field block">
            <mat-label>suffix</mat-label>
            <input class="input suffix" placeholder="suffix" matInput [formField]="component.form.names.suffix">
          </mat-form-field>
        </fieldset><!-- .names -->
      </mat-dialog-content>
      <mat-dialog-actions>
        <button type="button" matFab extended (click)="on_cancel($event)">
          <mat-icon>cancel</mat-icon>
          <span>Cancel</span>
        </button>
        <button type="submit" matFab extended [disabled]="component.form().invalid()">
          <mat-icon>save</mat-icon>
          <span>Save</span>
        </button>
      </mat-dialog-actions>
      <input type="hidden" [formField]="component.form.tenant_id">
      <input type="hidden" [formField]="component.form.partner_id">
    </form>
  </div><!-- .wrapper -->
</div><!-- .component -->
